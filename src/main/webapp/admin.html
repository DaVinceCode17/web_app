<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Admin - Cyron's Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        html,
        body {
            height: 100%;
            background: #d4edff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .phone-frame {
            width: 390px;
            height: 844px;
            background: white;
            border-radius: 40px;
            padding: 24px 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .phone-frame::-webkit-scrollbar {
            width: 3px;
        }
        .phone-frame::-webkit-scrollbar-thumb {
            background: #1f6f8a;
            border-radius: 10px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .top-bar .brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f2b3a;
        }
        .top-bar .brand i {
            color: #1f6f8a;
            margin-right: 6px;
        }
        .back-btn {
            background: #eef3f7;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            text-decoration: none;
            color: #0f2b3a;
            width: fit-content;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #dce6ed;
        }
        h2 {
            color: #0f2b3a;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 8px;
        }
        .form-card {
            background: #f8fbfd;
            border-radius: 16px;
            padding: 14px 14px;
            border: 1px solid #e8eef2;
            margin-top: 10px;
        }
        .form-card h3 {
            font-size: 0.9rem;
            color: #0f2b3a;
            margin-bottom: 6px;
            text-align: center;
        }
        .pricing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 8px 0;
        }
        .pricing-item {
            background: white;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #e8eef2;
            text-align: center;
        }
        .pricing-item input {
            width: 70px;
            padding: 4px 6px;
            border-radius: 30px;
            border: 1px solid #dce6ed;
            text-align: center;
            margin-top: 4px;
            font-size: 0.85rem;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.25s;
        }
        .btn-primary {
            background: #0f2b3a;
            color: white;
            box-shadow: 0 4px 16px rgba(15, 43, 58, 0.15);
        }
        .btn-primary:hover {
            background: #1a3f52;
            box-shadow: 0 8px 24px rgba(15, 43, 58, 0.2);
        }
        .table-wrap {
            overflow-x: auto;
            margin-top: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        th,
        td {
            padding: 6px 8px;
            border: 1px solid #e8eef2;
            text-align: left;
        }
        th {
            background: #eef3f7;
            font-weight: 600;
            color: #0f2b3a;
        }
        .badge {
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            color: white;
        }
        .badge.pending {
            background: #b8860b;
        }
        .badge.ongoing {
            background: #1f6f8a;
        }
        .badge.completed {
            background: #1a8c4a;
        }
        .action-btn {
            padding: 3px 10px;
            border: none;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .action-btn.start {
            background: #1f6f8a;
        }
        .action-btn.start:hover {
            background: #185a72;
        }
        .action-btn.complete {
            background: #1a8c4a;
        }
        .action-btn.complete:hover {
            background: #14753d;
        }
        .message {
            margin-top: 6px;
            font-size: 0.8rem;
            text-align: center;
        }
        .flex-grow {
            flex: 1;
        }
        .notification {
            background: #f8fbfd;
            padding: 10px 14px;
            border-radius: 12px;
            border-left: 4px solid #1f6f8a;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #0f2b3a;
            display: none;
        }
        .notification.show {
            display: block;
        }
        .notification.error {
            border-left-color: #b8860b;
            background: #fff8f0;
        }
        .notification.success {
            border-left-color: #1a8c4a;
            background: #f0fff5;
        }
        .notification.warning {
            border-left-color: #b8860b;
            background: #fff8f0;
        }
        @media (max-width: 430px) {
            .phone-frame {
                max-height: 98vh;
                padding: 18px 12px;
                border-radius: 30px;
            }
            .pricing-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .table-wrap {
                font-size: 0.65rem;
            }
            th,
            td {
                padding: 4px 6px;
            }
        }
        @media (max-width: 360px) {
            .pricing-grid {
                grid-template-columns: 1fr;
            }
        }
        /* Confirmation Dialog */
        .confirm-dialog {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .confirm-dialog.show {
            display: flex;
        }
        .confirm-dialog .dialog-box {
            background: white;
            border-radius: 24px;
            max-width: 340px;
            width: 100%;
            padding: 24px 20px;
            text-align: center;
        }
        .confirm-dialog .dialog-box h4 {
            font-size: 1.1rem;
            color: #0f2b3a;
            margin-bottom: 6px;
        }
        .confirm-dialog .dialog-box p {
            color: #4f6f82;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .confirm-dialog .dialog-box .btn-row {
            display: flex;
            gap: 12px;
        }
        .confirm-dialog .dialog-box .btn-row .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .confirm-dialog .dialog-box .btn-row .btn-cancel {
            background: #eef3f7;
            color: #0f2b3a;
        }
        .confirm-dialog .dialog-box .btn-row .btn-cancel:hover {
            background: #dce6ed;
        }
        .confirm-dialog .dialog-box .btn-row .btn-confirm {
            background: #1f6f8a;
            color: white;
        }
        .confirm-dialog .dialog-box .btn-row .btn-confirm:hover {
            background: #185a72;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="brand"><i class="fas fa-user-shield"></i> Admin Panel</div>
            <a href="index.html" style="font-size:0.75rem;color:#4f6f82;text-decoration:none;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>

        <div id="adminNotification" class="notification"></div>

        <!-- PRICING -->
        <div class="form-card">
            <h3><i class="fas fa-tag"></i> Set Pricing</h3>
            <div class="pricing-grid">
                <div class="pricing-item"><label>Wash</label><input type="number" id="priceWash" value="50" step="5" /></div>
                <div class="pricing-item"><label>Dry</label><input type="number" id="priceDry" value="30" step="5" /></div>
                <div class="pricing-item"><label>Fold</label><input type="number" id="priceFold" value="20" step="5" /></div>
            </div>
            <button class="btn btn-primary" id="updatePricingBtn"><i class="fas fa-save"></i> Update Pricing</button>
            <div id="pricingMessage" class="message"></div>
        </div>

        <!-- PENDING -->
        <div class="form-card">
            <h3><i class="fas fa-clock"></i> Pending Orders</h3>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>#</th><th>Customer</th><th>Services</th><th>Action</th></tr></thead>
                    <tbody id="pendingTableBody">
                        <tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ONGOING -->
        <div class="form-card">
            <h3><i class="fas fa-spinner"></i> Ongoing</h3>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>#</th><th>Customer</th><th>Services</th><th>Action</th></tr></thead>
                    <tbody id="ongoingTableBody">
                        <tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- COMPLETED -->
        <div class="form-card">
            <h3><i class="fas fa-check-circle"></i> Completed</h3>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>#</th><th>Customer</th><th>Services</th><th>Status</th></tr></thead>
                    <tbody id="completedTableBody">
                        <tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="flex-grow"></div>
    </div>

    <!-- Confirmation Dialog -->
    <div class="confirm-dialog" id="confirmDialog">
        <div class="dialog-box">
            <h4><i class="fas fa-exclamation-triangle" style="color:#b8860b;"></i> Confirm Action</h4>
            <p id="confirmMessage">Move this order to the next stage?</p>
            <div class="btn-row">
                <button class="btn btn-cancel" id="confirmCancel">Cancel</button>
                <button class="btn btn-confirm" id="confirmOk">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let pendingAction = null;

        // =============================================================
        // UPDATE PRICING
        // =============================================================
        document.getElementById('updatePricingBtn').addEventListener('click', function() {
            const wash = document.getElementById('priceWash').value;
            const dry = document.getElementById('priceDry').value;
            const fold = document.getElementById('priceFold').value;

            const pricing = { wash: parseFloat(wash), dry: parseFloat(dry), fold: parseFloat(fold) };
            localStorage.setItem('laundry_pricing', JSON.stringify(pricing));
            document.getElementById('pricingMessage').innerHTML = '<span style="color:#1a8c4a;">✅ Pricing updated!</span>';
        });

        // =============================================================
        // RENDER TABLES
        // =============================================================
        function renderAdminTables() {
            const orders = JSON.parse(localStorage.getItem('laundry_orders') || '[]');
            const users = JSON.parse(localStorage.getItem('laundry_users') || '[]');

            // Pending
            const pending = orders.filter(o => o.status === 'pending');
            const pendingBody = document.getElementById('pendingTableBody');
            if (pending.length === 0) {
                pendingBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr>';
            } else {
                pendingBody.innerHTML = pending.map((o) => {
                    const user = users.find(u => u.id == o.customerId) || { firstName: 'Unknown', lastName: '' };
                    return `<tr>
                        <td>${o.queueNumber}</td>
                        <td>${user.firstName || 'C'} ${user.lastName || ''}</td>
                        <td>${o.services}</td>
                        <td><button class="action-btn start" data-id="${o.id}" data-action="ongoing">▶ Start</button></td>
                    </tr>`;
                }).join('');
            }

            // Ongoing
            const ongoing = orders.filter(o => o.status === 'ongoing');
            const ongoingBody = document.getElementById('ongoingTableBody');
            if (ongoing.length === 0) {
                ongoingBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr>';
            } else {
                ongoingBody.innerHTML = ongoing.map((o) => {
                    const user = users.find(u => u.id == o.customerId) || { firstName: 'Unknown', lastName: '' };
                    return `<tr>
                        <td>${o.queueNumber}</td>
                        <td>${user.firstName || 'C'} ${user.lastName || ''}</td>
                        <td>${o.services}</td>
                        <td><button class="action-btn complete" data-id="${o.id}" data-action="completed">✓ Complete</button></td>
                    </tr>`;
                }).join('');
            }

            // Completed
            const completed = orders.filter(o => o.status === 'completed');
            const completedBody = document.getElementById('completedTableBody');
            if (completed.length === 0) {
                completedBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr>';
            } else {
                completedBody.innerHTML = completed.map((o) => {
                    const user = users.find(u => u.id == o.customerId) || { firstName: 'Unknown', lastName: '' };
                    return `<tr>
                        <td>${o.queueNumber}</td>
                        <td>${user.firstName || 'C'} ${user.lastName || ''}</td>
                        <td>${o.services}</td>
                        <td><span class="badge completed">Done</span></td>
                    </tr>`;
                }).join('');
            }

            // Attach event listeners to action buttons
            document.querySelectorAll('.action-btn.start, .action-btn.complete').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    const action = this.dataset.action;
                    const order = orders.find(o => o.id == id);
                    const msg = action === 'ongoing' ?
                        `Move order #${order.queueNumber} to <strong>Ongoing</strong>?` :
                        `Mark order #${order.queueNumber} as <strong>Completed</strong>?`;
                    showConfirmDialog(id, action, msg);
                });
            });
        }

        // =============================================================
        // CONFIRMATION DIALOG
        // =============================================================
        function showConfirmDialog(orderId, action, message) {
            pendingAction = { orderId, action };
            document.getElementById('confirmMessage').innerHTML = message;
            document.getElementById('confirmDialog').classList.add('show');
        }

        document.getElementById('confirmCancel').addEventListener('click', function() {
            document.getElementById('confirmDialog').classList.remove('show');
            pendingAction = null;
        });

        document.getElementById('confirmOk').addEventListener('click', function() {
            if (!pendingAction) return;
            const { orderId, action } = pendingAction;
            moveOrder(orderId, action);
            document.getElementById('confirmDialog').classList.remove('show');
            pendingAction = null;
        });

        document.getElementById('confirmDialog').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('show');
                pendingAction = null;
            }
        });

        // =============================================================
        // MOVE ORDER
        // =============================================================
        function moveOrder(orderId, newStatus) {
            const orders = JSON.parse(localStorage.getItem('laundry_orders') || '[]');
            const index = orders.findIndex(o => o.id == orderId);
            if (index !== -1) {
                orders[index].status = newStatus;
                localStorage.setItem('laundry_orders', JSON.stringify(orders));
                renderAdminTables();
                // Show notification
                const notif = document.getElementById('adminNotification');
                notif.className = 'notification show success';
                notif.innerHTML = '<i class="fas fa-check-circle"></i> Order #' + orders[index].queueNumber + ' updated to ' + newStatus.charAt(0).toUpperCase() + newStatus.slice(1) + '!';
                setTimeout(() => { notif.className = 'notification'; }, 3000);
            }
        }

        // =============================================================
        // INIT
        // =============================================================
        (function init() {
            // Seed admin
            const users = JSON.parse(localStorage.getItem('laundry_users') || '[]');
            if (!users.find(u => u.role === 'admin')) {
                users.push({
                    id: 999,
                    firstName: 'Admin',
                    lastName: 'User',
                    contact: 'admin',
                    password: 'admin123',
                    role: 'admin'
                });
                localStorage.setItem('laundry_users', JSON.stringify(users));
            }

            // Seed pricing
            const pricing = JSON.parse(localStorage.getItem('laundry_pricing'));
            if (!pricing) {
                localStorage.setItem('laundry_pricing', JSON.stringify({ wash: 50, dry: 30, fold: 20 }));
            }
            const p = JSON.parse(localStorage.getItem('laundry_pricing'));
            document.getElementById('priceWash').value = p.wash || 50;
            document.getElementById('priceDry').value = p.dry || 30;
            document.getElementById('priceFold').value = p.fold || 20;

            // Seed sample orders if none
            const orders = JSON.parse(localStorage.getItem('laundry_orders') || '[]');
            if (orders.length === 0) {
                const sampleOrders = [
                    { id: 1, customerId: 1, customerName: 'Juan Dela Cruz', services: 'Wash, Dry', serviceType: 'dropoff', status: 'pending', queueNumber: 1, createdAt: new Date().toLocaleString() },
                    { id: 2, customerId: 1, customerName: 'Juan Dela Cruz', services: 'Fold', serviceType: 'pickup', status: 'ongoing', queueNumber: 2, createdAt: new Date().toLocaleString() },
                    { id: 3, customerId: 1, customerName: 'Juan Dela Cruz', services: 'Wash, Fold', serviceType: 'dropoff', status: 'completed', queueNumber: 3, createdAt: new Date().toLocaleString() }
                ];
                localStorage.setItem('laundry_orders', JSON.stringify(sampleOrders));
            }

            renderAdminTables();
        })();

        window.moveOrder = moveOrder;
        window.renderAdminTables = renderAdminTables;
        window.showConfirmDialog = showConfirmDialog;
    </script>

</body>
</html>
