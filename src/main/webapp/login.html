<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Login - Cyron's Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        html,
        body {
            height: 100%;
            background: #d4edff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .phone-frame {
            width: 390px;
            height: 844px;
            background: white;
            border-radius: 40px;
            padding: 30px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .phone-frame::-webkit-scrollbar {
            width: 3px;
        }
        .phone-frame::-webkit-scrollbar-thumb {
            background: #1f6f8a;
            border-radius: 10px;
        }
        .back-btn {
            background: #eef3f7;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            text-decoration: none;
            color: #0f2b3a;
            width: fit-content;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #dce6ed;
        }
        .form-card {
            background: #f8fbfd;
            border-radius: 20px;
            padding: 24px 20px;
            border: 1px solid #e8eef2;
            flex: 1;
        }
        .form-card h2 {
            text-align: center;
            margin-bottom: 6px;
            font-size: 1.4rem;
            color: #0f2b3a;
        }
        .form-card .sub {
            text-align: center;
            color: #4f6f82;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #0f2b3a;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 50px;
            border: 1px solid #dce6ed;
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
        }
        .form-group input:focus {
            border-color: #1f6f8a;
            outline: none;
            box-shadow: 0 0 0 3px rgba(31, 111, 138, 0.1);
        }
        .role-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: white;
            border-radius: 60px;
            border: 1px solid #dce6ed;
        }
        .role-selector label {
            font-weight: 600;
            color: #0f2b3a;
            font-size: 0.85rem;
        }
        .role-selector select {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 40px;
            background: #eef3f7;
            font-weight: 600;
            color: #0f2b3a;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .role-selector select:focus {
            outline: none;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .form-actions .btn {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: 0.25s;
        }
        .btn-danger {
            background: #b8860b;
            color: white;
        }
        .btn-danger:hover {
            background: #9e7309;
        }
        .btn-primary {
            background: #0f2b3a;
            color: white;
            box-shadow: 0 4px 16px rgba(15, 43, 58, 0.2);
        }
        .btn-primary:hover {
            background: #1a3f52;
            box-shadow: 0 8px 24px rgba(15, 43, 58, 0.25);
        }
        .register-link {
            text-align: center;
            margin-top: 16px;
            font-size: 0.85rem;
            color: #4f6f82;
        }
        .register-link a {
            color: #1f6f8a;
            font-weight: 600;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .notification {
            background: #f8fbfd;
            padding: 12px 16px;
            border-radius: 12px;
            border-left: 4px solid #1f6f8a;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: #0f2b3a;
            display: none;
        }
        .notification.show {
            display: block;
        }
        .notification.error {
            border-left-color: #b8860b;
            background: #fff8f0;
        }
        .notification.success {
            border-left-color: #1a8c4a;
            background: #f0fff5;
        }
        @media (max-width: 430px) {
            .phone-frame {
                max-height: 98vh;
                padding: 20px 14px;
                border-radius: 30px;
            }
            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>

        <div class="form-card">
            <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
            <p class="sub">Sign in to continue</p>

            <div id="loginNotification" class="notification"></div>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Contact Number / Username</label>
                <input type="text" id="loginContact" placeholder="Enter your contact or username" />
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPass" placeholder="Enter your password" />
            </div>

            <!-- Role Selector -->
            <div class="role-selector">
                <label><i class="fas fa-users-cog"></i> Sign in as:</label>
                <select id="loginRole">
                    <option value="customer">👤 Customer</option>
                    <option value="admin">🛡️ Admin</option>
                </select>
            </div>

            <div class="form-actions">
                <a href="index.html" class="btn btn-danger">Cancel</a>
                <button class="btn btn-primary" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Log In</button>
            </div>

            <div class="register-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', function() {
            const contact = document.getElementById('loginContact').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const role = document.getElementById('loginRole').value;
            const notif = document.getElementById('loginNotification');

            if (!contact || !pass) {
                notif.className = 'notification show error';
                notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter your credentials.';
                return;
            }

            // Check for admin login
            if (role === 'admin') {
                if (contact === 'admin' && pass === 'admin123') {
                    notif.className = 'notification show success';
                    notif.innerHTML = '<i class="fas fa-check-circle"></i> Admin login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 800);
                    return;
                } else {
                    notif.className = 'notification show error';
                    notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid admin credentials.';
                    return;
                }
            }

            // Customer login
            const users = JSON.parse(localStorage.getItem('laundry_users') || '[]');
            const user = users.find(u => u.contact === contact && u.password === pass);

            if (user) {
                localStorage.setItem('current_customer_id', user.id || users.indexOf(user) + 1);
                notif.className = 'notification show success';
                notif.innerHTML = '<i class="fas fa-check-circle"></i> Login successful! Redirecting...';
                setTimeout(() => {
                    window.location.href = 'customer.html';
                }, 800);
            } else {
                notif.className = 'notification show error';
                notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid credentials. Please try again.';
            }
        });

        // Show registration success message if redirected
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('registered') === 'true') {
                const notif = document.getElementById('loginNotification');
                notif.className = 'notification show success';
                notif.innerHTML = '<i class="fas fa-check-circle"></i> Registration successful! Please log in.';
            }
        };
    </script>

</body>
</html>
